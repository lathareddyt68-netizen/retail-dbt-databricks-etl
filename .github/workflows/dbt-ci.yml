name: dbt CI Pipeline

on:
  push:
    branches:
      - dev

  pull_request:
    branches:
      - main
jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-databricks

      - name: Install dbt Packages
        run: dbt deps

      - name: Create dbt Profile
        run: |
          mkdir -p ~/.dbt

          cat > ~/.dbt/profiles.yml <<EOF
          retail_dbt_project:
            target: dev
            outputs:
              dev:
                type: databricks
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                catalog: ${{ secrets.DATABRICKS_CATALOG }}
                schema: ${{ secrets.DATABRICKS_DEV_SCHEMA }}
                threads: 4
          EOF

      - name: Verify dbt Connection
        run: dbt debug

      - name: Run dbt Tests
        run: dbt test

      - name: Run dbt Models
        run: dbt run
